apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: staging-yas-configuration
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devops-hcmus/yas-cd
    targetRevision: v0.0.8
    path: k8s/charts/yas-configuration
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
