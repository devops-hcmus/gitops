apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: dev-inventory
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/devops-hcmus/yas-cd
      targetRevision: main
      path: k8s/charts/inventory
      helm:
        valueFiles:
          - values.yaml
          - $values/clusters/dev/inventory/values.yaml
    - repoURL: https://github.com/devops-hcmus/gitops
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
