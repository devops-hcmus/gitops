backend:
  image:
    tag: v0.1.7
  replicaCount: 0
  ingress:
    enabled: false
  initContainers:
    - name: copy-sample-images
      image: danzgne/yas-sampledata:f5d26bd
      command: ["sh", "-c", "cp -r /sample-images/sample /images/ && echo 'Images copied'"]
      volumeMounts:
        - name: media-images
          mountPath: /images
  extraVolumes:
    - name: media-application
      configMap:
        name: media-application-configmap
    - name: media-images
      emptyDir: {}
  extraVolumeMounts:
    - name: media-application
      mountPath: /opt/yas/media
    - name: media-images
      mountPath: /images
