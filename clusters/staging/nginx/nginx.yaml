apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-api-config
  namespace: staging
data:
  default.conf: |
    server {
      listen 80;

      # Kubernetes CoreDNS
      resolver 10.96.0.10 valid=10s;

      # Proxy settings to prevent upstream connection issues (Istio sidecar headers)
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_buffering on;
      proxy_buffer_size 128k;
      proxy_buffers 4 256k;
      proxy_busy_buffers_size 256k;
      proxy_max_temp_file_size 2048m;
      proxy_temp_file_write_size 256k;

      # Enable keepalive to upstream servers
      keepalive_timeout 65s;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      # Error handling
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 2;

      location /media/ {
        set $upstream "media.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /product/ {
        set $upstream "product.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /customer/ {
        set $upstream "customer.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /cart/ {
        set $upstream "cart.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /rating/ {
        set $upstream "rating.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /order/ {
        set $upstream "order.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /location/ {
        set $upstream "location.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /inventory/ {
        set $upstream "inventory.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /tax/ {
        set $upstream "tax.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /promotion/ {
        set $upstream "promotion.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /search/ {
        set $upstream "search.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /payment/ {
        set $upstream "payment.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /webhook/ {
        set $upstream "webhook.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /sampledata/ {
        set $upstream "sampledata.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /recommendation/ {
        set $upstream "recommendation.staging.svc.cluster.local";
        proxy_pass http://$upstream;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: config
          configMap:
            name: nginx-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: staging
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-api
  namespace: staging
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Istio sidecar làm response header lớn — tránh 502 từ ingress-nginx
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
    nginx.ingress.kubernetes.io/proxy-body-size: "30m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.staging.yas.local.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
