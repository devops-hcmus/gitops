backend:
  image:
    tag: "83da8c5"
  replicaCount: 1
  # Route qua nginx API gateway (gitops/clusters/dev/nginx) — có proxy_buffer cho Istio sidecar.
  # Ingress riêng /media → media trực tiếp gây 502 (ảnh, swagger api-docs) khi bật mesh.
  ingress:
    enabled: false
  initContainers:
    - name: copy-sample-images
      image: danzgne/yas-sampledata:main
      command: ["sh", "-c", "cp -r /sample-images/sample /images/ && echo 'Images copied'"]
      volumeMounts:
        - name: media-images
          mountPath: /images
  extraVolumes:
    - name: media-application
      configMap:
        name: media-application-configmap
    - name: media-images
      emptyDir: {}
  extraVolumeMounts:
    - name: media-application
      mountPath: /opt/yas/media
    - name: media-images
      mountPath: /images
